
<section class="container mt-5" style="max-width: 420px;" aria-labelledby="login-title">
  <div class="card shadow-sm">
    <div class="card-body">
      <h1 id="login-title" class="h4 mb-4 text-center">Connexion</h1>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-3">
      
          <label for="login-email" class="form-label">Email</label>
          <input id="login-email" type="email" class="form-control" formControlName="email" autocomplete="email" />
        </div>

        <div class="mb-3">
          <label for="login-password" class="form-label">Mot de passe</label>
          <input
            id="login-password"
            type="password"
            class="form-control"
            formControlName="password"
            autocomplete="current-password"
          />
        </div>

        @if (errorMessage()) {
          <div class="alert alert-danger" role="alert">
            {{ errorMessage() }}
          </div>
        }

        <button class="btn btn-primary w-100" type="submit" [disabled]="isSubmitDisabled()">
          {{ loading() ? 'Connexion...' : 'Se connecter' }}
        </button>
      </form>
    </div>
  </div>

</section>
